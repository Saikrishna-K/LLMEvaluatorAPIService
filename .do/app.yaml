# DigitalOcean App Platform specification
# Deploy:  doctl apps create --spec .do/app.yaml
# Update:  doctl apps update <APP_ID> --spec .do/app.yaml
#
# Instance sizing rationale (basic-s = 1 vCPU / 2 GB RAM):
#   JVM heap (-Xmx1g)            ~1024 MB
#   Metaspace + JVM native        ~150 MB
#   Shadow thread pool (16×1 MB)   ~16 MB
#   Queue buffer (500×50 KB)       ~25 MB
#   WebClient / Netty pools        ~30 MB
#   OS headroom                   ~150 MB
#   ─────────────────────────────────────
#   Total estimated               ~1395 MB  (fits comfortably in 2 GB)
#
# Scale to basic-m (2 vCPU / 4 GB) if sustained traffic exceeds ~60 req/min.

name: llm-evaluator-api
region: nyc

services:
  - name: api
    # Source: Docker image built and pushed by the GitHub Actions workflow.
    # The workflow tags the image with the Git SHA and updates this spec.
    image:
      registry_type: DOCR
      registry: ${DO_REGISTRY_NAME}        # set via GitHub secret
      repository: llm-evaluator
      tag: latest

    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-s            # 1 vCPU, 2 GB RAM

    health_check:
      http_path: /actuator/health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    # ---------------------------------------------------------------------------
    # Environment variables
    # Secrets (type: SECRET) are stored encrypted in DO App Platform.
    # Set them once via the DO console or doctl after first deploy.
    # ---------------------------------------------------------------------------
    envs:
      # Primary LLM — DigitalOcean Serverless Inference
      - key: DO_INFERENCE_API_KEY
        scope: RUN_TIME
        type: SECRET

      - key: DO_INFERENCE_BASE_URL
        scope: RUN_TIME
        value: https://inference.do-ai.run

      - key: PRIMARY_LLM_MODEL
        scope: RUN_TIME
        value: llama3.3-70b-instruct

      - key: PRIMARY_LLM_TIMEOUT_MS
        scope: RUN_TIME
        value: "30000"

      # Candidate LLM — second DO model or any OpenAI-compatible endpoint
      - key: CANDIDATE_LLM_BASE_URL
        scope: RUN_TIME
        value: https://inference.do-ai.run

      - key: CANDIDATE_LLM_API_KEY
        scope: RUN_TIME
        type: SECRET

      - key: CANDIDATE_LLM_MODEL
        scope: RUN_TIME
        value: llama3.1-8b-instruct

      - key: CANDIDATE_LLM_TIMEOUT_MS
        scope: RUN_TIME
        value: "60000"

      # Shadow executor tuning
      - key: SHADOW_QUEUE_CAPACITY
        scope: RUN_TIME
        value: "500"

      - key: SHADOW_POOL_CORE_SIZE
        scope: RUN_TIME
        value: "4"

      - key: SHADOW_POOL_MAX_SIZE
        scope: RUN_TIME
        value: "16"

      # Evaluation phase: "action-field" (Phase 2) or "json-equality" (Phase 1)
      - key: SHADOW_EVAL_MODE
        scope: RUN_TIME
        value: action-field
