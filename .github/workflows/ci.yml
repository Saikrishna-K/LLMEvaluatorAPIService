name: CI / CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: llm-evaluator

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Test (runs on every push and PR)
  # ---------------------------------------------------------------------------
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run unit and integration tests
        # mvn verify runs: compile → test (Surefire) → integration-test (Failsafe) → verify
        # All LLM calls are stubbed via WireMock — no real API keys needed in CI.
        run: mvn verify --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/

  # ---------------------------------------------------------------------------
  # Job 2: Build & Push Docker image (only on push to main after tests pass)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build Docker image
        run: |
          docker build \
            -t $REGISTRY/${{ secrets.DO_REGISTRY_NAME }}/$IMAGE_NAME:${{ github.sha }} \
            -t $REGISTRY/${{ secrets.DO_REGISTRY_NAME }}/$IMAGE_NAME:latest \
            .

      - name: Push image
        run: |
          docker push $REGISTRY/${{ secrets.DO_REGISTRY_NAME }}/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/${{ secrets.DO_REGISTRY_NAME }}/$IMAGE_NAME:latest

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to DO App Platform (only on main after image is pushed)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to App Platform
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to App Platform
        # Redeploy using the app config already stored in DO (no .do/app.yaml in repo).
        # Requires the App Platform app to use image tag "latest" from DOCR.
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }}

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete..."
          doctl apps list-deployments ${{ secrets.DO_APP_ID }} \
            --format ID,Phase,Progress \
            --no-header | head -5
